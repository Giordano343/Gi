<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全功能聚合门户 - 搜索/视频/社交/助手</title>
<style>
:root { --bg: #121212; --card: #1e1e1e; --primary: #ff6b35; --text: #e0e0e0; --sub: #888; --border: #333; }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; transition: all 0.3s ease; }
body { background: var(--bg); color: var(--text); overflow-x: hidden; }
/* 导航与菜单 */
nav { position:fixed; top:0; width:100%; height:56px; background:rgba(18,18,18,0.95); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:space-between; padding:0 20px; z-index:1000; border-bottom:1px solid var(--border); }
.logo { font-size:1.5rem; font-weight:800; color:var(--primary); cursor:pointer; }
.nav-links a { color:var(--text); text-decoration:none; margin:0 12px; font-size:0.9rem; cursor:pointer; }
.nav-links a:hover { color:var(--primary); }
/* 搜索框 (模仿搜狗) */
.search-container { max-width:700px; margin:100px auto 30px; padding:0 20px; }
.search-box { display:flex; border:2px solid var(--primary); border-radius:25px; overflow:hidden; background:var(--card); }
.search-box input { flex:1; padding:14px 20px; border:none; background:transparent; color:var(--text); font-size:1rem; outline:none; }
.search-tabs { display:flex; gap:10px; margin-top:10px; padding-left:20px; }
.search-tabs span { font-size:0.8rem; color:var(--sub); cursor:pointer; padding:4px 10px; border-radius:12px; }
.search-tabs span.active, .search-tabs span:hover { background:var(--primary); color:#fff; }
/* 内容网格 */
.content-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; padding:20px; max-width:1400px; margin:0 auto; }
.card { background:var(--card); border-radius:12px; overflow:hidden; border:1px solid var(--border); cursor:pointer; }
.card:hover { transform:translateY(-4px); border-color:var(--primary); box-shadow:0 8px 25px rgba(255,107,53,0.15); }
.card-img { width:100%; height:180px; background:#333; position:relative; }
.card-img video, .card-img img { width:100%; height:100%; object-fit:cover; }
.badge { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); padding:2px 8px; border-radius:4px; font-size:0.7rem; }
.card-body { padding:15px; }
.card-body h3 { font-size:1rem; margin-bottom:8px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-meta { font-size:0.8rem; color:var(--sub); display:flex; justify-content:space-between; }
/* 模态框 (登录/注册/助手) */
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
.modal { background:var(--card); padding:30px; border-radius:16px; width:90%; max-width:400px; border:1px solid var(--border); position:relative; animation:popIn 0.3s ease; }
@keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
.modal h2 { margin-bottom:20px; color:var(--primary); }
.form-group { margin-bottom:15px; }
.form-group input { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; background:#252525; color:var(--text); outline:none; }
.form-group input:focus { border-color:var(--primary); }
.btn { width:100%; padding:12px; border:none; border-radius:8px; background:var(--primary); color:#fff; font-weight:bold; cursor:pointer; margin-top:10px; }
.btn:hover { opacity:0.9; }
.close-modal { position:absolute; top:15px; right:15px; cursor:pointer; font-size:1.2rem; color:var(--sub); }
/* 智能助手浮窗 */
.ai-float { position:fixed; bottom:30px; right:30px; width:60px; height:60px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 20px rgba(255,107,53,0.4); z-index:1500; font-size:1.5rem; }
.ai-chat { position:fixed; bottom:100px; right:30px; width:320px; height:450px; background:var(--card); border:1px solid var(--border); border-radius:16px; display:none; flex-direction:column; z-index:1500; overflow:hidden; }
.ai-header { padding:15px; background:var(--primary); color:#fff; font-weight:bold; }
.ai-msgs { flex:1; padding:15px; overflow-y:auto; font-size:0.9rem; line-height:1.5; }
.ai-input-area { display:flex; padding:10px; border-top:1px solid var(--border); }
.ai-input-area input { flex:1; padding:8px; border:none; background:transparent; color:var(--text); outline:none; }
/* 响应式与移动端适配 */
@media(max-width:768px) {
    .content-grid { grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px; padding:12px; }
    .card-img { height:120px; }
    .card-body h3 { font-size:0.85rem; }
    .nav-links { display:none; } /* 简化移动端导航，实际应使用汉堡菜单 */
    .search-container { margin-top:80px; }
    .ai-chat { width:calc(100vw - 30px); right:15px; bottom:90px; height:60vh; }
}
/* 滚动条美化 */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--primary); }
.hidden { display:none !important; }
</style>
</head>
<body>

<!-- 导航栏 -->
<nav>
    <div class="logo" onclick="location.reload()">聚合门户</div>
    <div class="nav-links">
        <a onclick="switchTab('video')">视频</a>
        <a onclick="switchTab('news')">新闻</a>
        <a onclick="switchTab('social')">社交</a>
        <a onclick="openModal('loginModal')">登录</a>
        <a onclick="openModal('regModal')" style="color:var(--primary)">注册</a>
    </div>
</nav>

<!-- 搜索区域 -->
<div class="search-container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索视频、新闻、用户或网盘文件...">
        <button class="btn" style="width:auto; margin:5px; border-radius:20px; padding:0 25px;" onclick="handleSearch()">搜索</button>
    </div>
    <div class="search-tabs">
        <span class="active" onclick="setSearchType(this)">综合</span>
        <span onclick="setSearchType(this)">视频</span>
        <span onclick="setSearchType(this)">图片</span>
        <span onclick="setSearchType(this)">用户</span>
        <span onclick="setSearchType(this)">网盘</span>
    </div>
</div>

<!-- 内容区 -->
<div class="content-grid" id="mainContent">
    <!-- JS动态生成 -->
</div>

<!-- 登录模态框 -->
<div id="loginModal" class="modal-overlay" onclick="closeModal(event, 'loginModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('loginModal').style.display='none'">&times;</span>
        <h2>欢迎回来</h2>
        <div class="form-group"><input type="text" placeholder="手机号/邮箱"></div>
        <div class="form-group"><input type="password" placeholder="密码"></div>
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--sub); margin-bottom:10px;">
            <label><input type="checkbox"> 记住我</label>
            <a style="color:var(--primary); cursor:pointer;" onclick="alert('重置密码链接已发送至您的邮箱/手机')">忘记密码？</a>
        </div>
        <button class="btn" onclick="alert('登录成功！'); document.getElementById('loginModal').style.display='none'">登录</button>
        <p style="text-align:center; margin-top:15px; font-size:0.8rem; color:var(--sub);">
            没有账号？<a style="color:var(--primary); cursor:pointer;" onclick="document.getElementById('loginModal').style.display='none'; openModal('regModal')">立即注册</a>
        </p>
    </div>
</div>

<!-- 注册模态框 -->
<div id="regModal" class="modal-overlay" onclick="closeModal(event, 'regModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('regModal').style.display='none'">&times;</span>
        <h2>创建账号</h2>
        <div class="form-group"><input type="text" placeholder="昵称"></div>
        <div class="form-group"><input type="tel" placeholder="手机号"></div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1"><input type="text" placeholder="验证码"></div>
            <button class="btn" style="width:auto; margin-top:0; padding:0 15px; font-size:0.8rem;" onclick="this.innerText='60s后重发'">获取验证码</button>
        </div>
        <div class="form-group"><input type="password" placeholder="设置密码"></div>
        <button class="btn" onclick="alert('注册成功！'); document.getElementById('regModal').style.display='none'">注册</button>
    </div>
</div>

<!-- 智能助手 -->
<div class="ai-float" onclick="toggleAI()">🤖</div>
<div id="aiChat" class="ai-chat">
    <div class="ai-header">智能助手 <span style="float:right; cursor:pointer;" onclick="toggleAI()">&times;</span></div>
    <div class="ai-msgs" id="aiMsgs">你好！我是你的智能助手，可以帮你搜索、解答问题或管理文件。</div>
    <div class="ai-input-area">
        <input type="text" id="aiInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter') sendAI()">
        <button style="background:none; border:none; color:var(--primary); cursor:pointer;" onclick="sendAI()">发送</button>
    </div>
</div>

<script>
// 模拟数据
const mockData = [
    { type:'video', title:'2024全球AI开发者大会精彩回顾', meta:'科技前沿 • 120万播放', img:'https://picsum.photos/400/225?random=1' },
    { type:'news', title:'新能源汽车出口量再创新高，产业链迎来新机遇', meta:'财经新闻 • 2小时前', img:'https://picsum.photos/400/225?random=2' },
    { type:'video', title:'沉浸式体验：4K修复版经典电影合集', meta:'影视娱乐 • 85万播放', img:'https://picsum.photos/400/225?random=3' },
    { type:'social', title:'周末城市徒步活动招募，一起探索老街巷弄', meta:'同城活动 • 32人参与', img:'https://picsum.photos/400/225?random=4' },
    { type:'video', title:'零基础Python入门：从环境搭建到第一个爬虫', meta:'在线教育 • 45万播放', img:'https://picsum.photos/400/225?random=5' },
    { type:'news', title:'春季养生指南：这五种时令蔬菜不可错过', meta:'健康生活 • 5小时前', img:'https://picsum.photos/400/225?random=6' },
];

// 渲染内容
function renderContent(filter = 'all') {
    const grid = document.getElementById('mainContent');
    grid.innerHTML = '';
    const filtered = filter === 'all' ? mockData : mockData.filter(d => d.type === filter);
    
    filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-img">
                <image src="${item.img}" alt="${item.title}" loading="lazy">
                <span class="badge">${item.type === 'video' ? '▶ 视频' : item.type === 'news' ? '📰 新闻' : '💬 社交'}</span>
            </div>
            <div class="card-body">
                <h3>${item.title}</h3>
                <div class="card-meta"><span>${item.meta.split('•')}</span><span>${item.meta.split('•') || ''}</span></div>
            </div>
        `;
        card.onclick = () => alert(`正在打开: ${item.title}\n\n功能演示：此处可跳转至视频播放页、新闻详情页或社交动态页。`);
        grid.appendChild(card);
    });
}

// 搜索与Tab切换
function handleSearch() {
    const val = document.getElementById('searchInput').value.trim();
    if(!val) { renderContent(); return; }
    alert(`正在搜索: "${val}"\n\n模拟结果：找到 128 条相关内容\n（实际项目中此处调用API并重新渲染列表）`);
}

function setSearchType(el) {
    document.querySelectorAll('.search-tabs span').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
}

function switchTab(tab) {
    renderContent(tab);
    window.scrollTo({ top: 300, behavior: 'smooth' });
}

// 模态框控制
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(e, id) { if(e.target === e.currentTarget) document.getElementById(id).style.display = 'none'; }

// 智能助手逻辑
function toggleAI() {
    const chat = document.getElementById('aiChat');
    chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
}

function sendAI() {
    const input = document.getElementById('aiInput');
    const msgs = document.getElementById('aiMsgs');
    const val = input.value.trim();
    if(!val) return;
    
    msgs.innerHTML += `<div style="margin:10px 0; text-align:right; color:var(--primary);">你: ${val}</div>`;
    input.value = '';
    
    setTimeout(() => {
        let reply = "我正在学习如何更好地帮助你。你可以尝试问我：'推荐热门视频'、'如何找回密码' 或 '上传照片流程'。";
        if(val.includes('视频')) reply = "为你推荐：《2024全球AI开发者大会》和《经典电影4K修复版》，点击首页卡片即可观看。";
        if(val.includes('密码')) reply = "请点击登录框下方的'忘记密码'，系统将发送验证码至您的绑定手机或邮箱。";
        if(val.includes('上传')) reply = "进入个人中心 -> 网盘空间 -> 点击右上角'+'号即可上传照片或文件，支持拖拽上传。";
        
        msgs.innerHTML += `<div style="margin:10px 0; background:#252525; padding:10px; border-radius:10px;">助手: ${reply}</div>`;
        msgs.scrollTop = msgs.scrollHeight;
    }, 600);
    msgs.scrollTop = msgs.scrollHeight;
}

// 初始化
renderContent();

// 监听回车搜索
document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') handleSearch();
});
</script>
</body>
</html>
